# ░█▀█░░█░░█▀▀░█▀▄░█░░░█░█░█░░░█▀▀░
# ░▀░▀░░▀░░▀░░░▀░▀░▀▀▀░▀▀▀░▀▀▀░▀░▀░
# GODLY EDITION — Cinematic Asymmetric Design

# ─────────────────────────────────────────────────────
# GENERAL
# ─────────────────────────────────────────────────────
general {
    hide_cursor = true
}

# ─────────────────────────────────────────────────────
# BACKGROUND
# ─────────────────────────────────────────────────────
background {
    monitor           =
    path              = /home/ratul/Pictures/Wallpapers/wallhaven-01.jpg
    blur_passes       = 3
    blur_size         = 8
    noise             = 0.015
    contrast          = 0.85
    brightness        = 0.60
    vibrancy          = 0.21
    vibrancy_darkness = 0.3
}

# ═════════════════════════════════════════════════════
# TOP-LEFT SYSTEM TAG
# ═════════════════════════════════════════════════════

label {
    monitor     =
    text        = ARCH · HYPRLAND
    color       = rgba(255, 255, 255, 0.08)
    font_size   = 9
    font_family = JetBrainsMono Nerd Font
    position    = -860, 470
    halign      = center
    valign      = center
    zindex      = 2
}

# ─────────────────────────────────────────────────────
# ░░ LEFT — MASSIVE CLOCK ░░
# ─────────────────────────────────────────────────────

# HOUR
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H")"
    color       = rgba(255, 255, 255, 0.93)
    font_size   = 160
    font_family = JetBrainsMono Nerd Font Bold
    position    = -340, 100
    halign      = center
    valign      = center
    shadow_passes = 3
    shadow_size   = 20
    shadow_color  = rgba(0, 0, 0, 0.70)
    shadow_boost  = 1.5
    zindex      = 2
}

# MINUTES
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +":%M")"
    color       = rgba(255, 255, 255, 0.32)
    font_size   = 90
    font_family = JetBrainsMono Nerd Font
    position    = -110, 65
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 10
    shadow_color  = rgba(0, 0, 0, 0.50)
    zindex      = 2
}

# DAY OF WEEK
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A")"
    color       = rgba(255, 255, 255, 0.82)
    font_size   = 28
    font_family = JetBrainsMono Nerd Font Bold
    position    = -340, -28
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 6
    shadow_color  = rgba(0, 0, 0, 0.50)
    zindex      = 2
}

# DATE
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%d %B %Y")"
    color       = rgba(255, 255, 255, 0.42)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font
    position    = -340, -60
    halign      = center
    valign      = center
    zindex      = 2
}

# AM/PM
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%p")"
    color       = rgba(180, 210, 255, 0.40)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    position    = -220, -60
    halign      = center
    valign      = center
    zindex      = 2
}

# ─────────────────────────────────────────────────────
# VERTICAL DIVIDER
# ─────────────────────────────────────────────────────
shape {
    monitor  =
    size     = 1, 300
    color    = rgba(255, 255, 255, 0.12)
    rounding = 0
    position = 65, 25
    halign   = center
    valign   = center
    zindex   = 2
}

# ─────────────────────────────────────────────────────
# ░░ RIGHT — PROFILE + LOGIN CARD ░░
# ─────────────────────────────────────────────────────

# Profile image
image {
    monitor      =
    path         = /home/ratul/Pictures/profile.png
    size         = 96
    rounding     = -1
    border_size  = 2
    border_color = rgba(255, 255, 255, 0.38)
    position     = 310, 130
    halign       = center
    valign       = center
    shadow_passes = 3
    shadow_size   = 14
    shadow_color  = rgba(0, 0, 0, 0.60)
    shadow_boost  = 1.2
    zindex       = 3
}

# Name
label {
    monitor     =
    text        = 󰀄  Ratul
    color       = rgba(180, 210, 255, 0.95)
    font_size   = 32              # increased from 24 → 32
    font_family = JetBrainsMono Nerd Font Bold
    position    = 310, 70         # moved slightly down for spacing
    halign      = center
    valign      = center
    shadow_passes = 4             # slightly stronger shadow
    shadow_size   = 10
    shadow_color  = rgba(0, 0, 0, 0.7)
    shadow_boost  = 1.3
    zindex      = 3
}

# Dynamic greeting
label {
    monitor     =
    text        = cmd[update:3600000] bash -c 'h=$(date +%H); if [ "$h" -lt 5 ]; then echo "  Good Night"; elif [ "$h" -lt 12 ]; then echo "󰖚  Good Morning"; elif [ "$h" -lt 17 ]; then echo "  Good Afternoon"; else echo "󰖔  Good Evening"; fi'
    color       = rgba(170, 205, 255, 0.75)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    position    = 310, 30
    halign      = center
    valign      = center
    zindex      = 3
}

# Hostname — FIX: moved up, clear of input field and unlock hint
label {
    monitor     =
    text        = cmd[update:999999] bash -c 'echo "  $(cat /etc/hostname)"'
    color       = rgba(255, 255, 255, 0.35)
    font_size   = 10
    font_family = JetBrainsMono Nerd Font
    position    = 310, -18
    halign      = center
    valign      = center
    zindex      = 3
}

# Thin separator
shape {
    monitor  =
    size     = 220, 1
    color    = rgba(255, 255, 255, 0.08)
    rounding = 0
    position = 310, -38
    halign   = center
    valign   = center
    zindex   = 3
}

# ─────────────────────────────────────────────────────
# PASSWORD FIELD — FIX: single # in pango spans
# ─────────────────────────────────────────────────────
input-field {
    monitor  =
    size     = 275, 50
    rounding = 12

    outline_thickness = 1
    outer_color = rgba(255, 255, 255, 0.18)
    inner_color = rgba(8, 8, 18, 0.60)
    font_color  = rgba(255, 255, 255, 1.0)
    font_family = JetBrainsMono Nerd Font

    dots_size     = 0.24
    dots_spacing  = 0.22
    dots_center   = true
    dots_rounding = -1

    placeholder_text = <span foreground="#7a7d9a" font_size="12pt">enter password</span>

    fade_on_empty = true
    fade_timeout  = 1000

    check_color = rgba(120, 215, 150, 0.95)
    fail_color  = rgba(235, 95, 95, 0.90)
    fail_text   = <span foreground="#eb5f5f" font_size="11pt">wrong password</span>

    capslock_color = rgba(255, 205, 70, 0.90)
    numlock_color  = rgba(160, 215, 255, 0.85)

    position = 310, -80
    halign   = center
    valign   = center
    zindex   = 4
}

# Unlock hint
label {
    monitor     =
    text        = press enter to unlock
    color       = rgba(255, 255, 255, 0.14)
    font_size   = 9
    font_family = JetBrainsMono Nerd Font
    position    = 310, -112
    halign      = center
    valign      = center
    zindex      = 3
}

# ═════════════════════════════════════════════════════
# BOTTOM DATA BAR — FIX: raised up so it's fully visible
# ═════════════════════════════════════════════════════

shape {
    monitor  =
    size     = 1400, 1
    color    = rgba(255, 255, 255, 0.10)
    rounding = 0
    position = 0, -268
    halign   = center
    valign   = center
    zindex   = 2
}

# Current weather — left zone
label {
    monitor     =
    text        = cmd[update:600000] /home/ratul/.config/hypr/scripts/weather-strip.sh current
    color       = rgba(255, 255, 255, 0.68)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font
    position    = -310, -285
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 5
    shadow_color  = rgba(0, 0, 0, 0.50)
    zindex      = 2
}

# Timezone — centred on vertical divider
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M:%S  ·  %Z")"
    color       = rgba(255, 255, 255, 0.18)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font
    position    = 65, -285
    halign      = center
    valign      = center
    zindex      = 2
}

# Uptime — right zone
label {
    monitor     =
    text        = cmd[update:60000] /home/ratul/.config/hypr/scripts/hyprlock-uptime.sh
    color       = rgba(255, 255, 255, 0.30)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font
    position    = 620, -285
    halign      = center
    valign      = center
    zindex      = 2
}

# 3-day forecast strip
label {
    monitor     =
    text        = cmd[update:1800000] /home/ratul/.config/hypr/scripts/weather-strip.sh strip
    color       = rgba(100, 180, 255, 0.62)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font
    position    = 0, -308
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.45)
    zindex      = 2
}