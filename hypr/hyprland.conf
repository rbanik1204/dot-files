##########################
########MONITOR###########
##########################

monitor=,preferred,auto,1

##########################
#########INPUT############
##########################
input {
	kb_layout = us
        follow_mouse = 1
        sensitivity = 0
	touchpad {
        tap-to-click = true
        drag_lock = true      # keeps drag active without holding finger
        natural_scroll = true
		scroll_factor = 1.0
        tap-and-drag = true        # THIS is what enables drag gestures
        drag_lock = true           # lift finger without dropping drag
    }
}


cursor {
	no_hardware_cursors = true
        inactive_timeout = 10
}



##########################
########GENERAL###########
##########################
general {
	layout = dwindle
	gaps_in = 7
	gaps_out = 10
	border_size = 2
	col.active_border = rgb(89b4fa)
	col.inactive_border = rgb(313244)
}

##########################
#####DECORATION###########
##########################
decoration {
	rounding = 10
	blur {
		enabled = true
		size = 3
		passes = 2
	}
}


##########################
#########VSYNC############
##########################
#Prevents Frame drops
misc {
	vfr = true
	vrr = 1

}

##########################
#######ANIMATIONS#########
##########################
animations {
	enabled = yes
	
	bezier = smooth,0.1,0.9,0.36,1.05
	animation = windows, 1, 6, smooth
	animation = border, 1, 6, smooth
	animation = windowsOut, 1, 6, smooth, popin 60%
	animation = fade, 1, 6, smooth
	animation = workspaces, 1, 6, smooth
}

##########################
#######AUTOSTART##########
##########################
exec-once = hypridle &
exec-once = ~/.config/waybar/scripts/launch.sh &
exec-once = nm-applet &
exec-once = swaync &
#exec-once = blueman-applet &
# Tray dependencies — order matters
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/lib/xdg-desktop-portal

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP & 
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = RUST_LOG=error awww-daemon
##########################
#####ENV-VARS(NVIDIA)#######
##########################




##########################
#####KEYBINDS#############
##########################

bind = SUPER, Return, exec, kitty
bind = SUPER_SHIFT,D, exec, pkill rofi || ~/.config/rofi/launchers/type-1/launcher.sh
bind = SUPER, B, exec, thunar
bind = SUPER, escape, killactive
bind = SUPER, Q, killactive
bind = SUPER, R, exec, ~/.config/waybar/scripts/launch.sh
#Zsh SHELL->Default SHELL for the 'root' USER
bind = SUPER, M, exit,

#DISPLAY
bind = SUPER, F, fullscreen,

#WAYBAR-WOFI
bind = SUPER_SHIFT, W, exec, waybar
bind = SUPER,SPACE, exec, wofi --show drun
bind = SUPER, V, togglefloating

#FOCUS
bind = SUPER, TAB, cyclenext    
bind = SUPER_SHIFT, TAB, cyclenext, prev  

bind = SUPER, W, movefocus, u
bind = SUPER, S, movefocus, d
bind = SUPER, A, movefocus, l
bind = SUPER, D, movefocus, r


bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow


#CREATE WORKSPACE
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

#SHIFT WORKSPACE
bind = SUPER_SHIFT, 1, movetoworkspace, 1
bind = SUPER_SHIFT, 2, movetoworkspace, 2
bind = SUPER_SHIFT, 3, movetoworkspace, 3
bind = SUPER_SHIFT, 4, movetoworkspace, 4
bind = SUPER_SHIFT, 5, movetoworkspace, 5
bind = SUPER_SHIFT, 6, movetoworkspace, 6
bind = SUPER_SHIFT, 7, movetoworkspace, 7
bind = SUPER_SHIFT, 8, movetoworkspace, 8
bind = SUPER_SHIFT, 9, movetoworkspace, 9

bind = , Print, exec, grim - | wl-copy
bind = SUPER, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot_$(date +%s).png
bind = SUPER_SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date +%s).png
#LOCK SCREEN

#HYPRLOCK
bind = SUPER, L, exec , hyprlock

#matugen

bind = SUPER_SHIFT, R, exec, ~/.config/matugen/scripts/wall.sh

# Brightness
bind = SUPER, F2, exec, brightnessctl set 1%-
bind = SUPER, F3, exec, brightnessctl set +1%

# Mute
bind = SUPER, F5, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Volume
bind = SUPER, F7, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bind = SUPER, F6, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%


# Hold SUPER + right-click drag to resize
bindm = SUPER, mouse:273, resizewindow

# Hold SUPER + left-click drag to move
bindm = SUPER, mouse:272, movewindow


bind = SUPER SHIFT, left,  resizeactive, -40 0
bind = SUPER SHIFT, right, resizeactive,  40 0
bind = SUPER SHIFT, up,    resizeactive, 0 -40
bind = SUPER SHIFT, down,  resizeactive,  0 40